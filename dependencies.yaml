# Dependency list for https://github.com/rapidsai/dependency-file-generator
files:
  all:
    output: [conda]
    matrix:
      # CUDA versions match PyTorch releases, not RAPIDS
      # ref: https://pytorch.org/get-started/locally/
      cuda: ["12.9", "13.2"]
      arch: [x86_64, aarch64]
    includes:
      - checks
      - common_build
      - cuda
      - cuda_version
      - docs
      - python_build_cythonize
      - depends_on_rmm
      - depends_on_pylibcugraph
      - depends_on_cugraph
      - depends_on_cudf
      - depends_on_cupy
      - depends_on_cuml
      - depends_on_nccl
      - depends_on_pytorch
      - depends_on_pyg
      - python_run_cugraph_pyg
      - rapids_build_setuptools
      - rapids_build_skbuild
      - test_cpp
      - test_python_common
      - test_python_pylibwholegraph
  checks:
    output: none
    includes:
      - checks
      - py_version
  docs:
    output: none
    includes:
      - cuda_version
      - docs
      - py_version
      - depends_on_libwholegraph
  test_cpp:
    output: none
    includes:
      - cuda_version
      - test_cpp
      - depends_on_libwholegraph
      - depends_on_libwholegraph_tests
      - depends_on_nccl
  test_cugraph_pyg:
    output: none
    includes:
      - cuda_version
      - depends_on_cugraph
      - depends_on_cudf
      - depends_on_pytorch
      - depends_on_cuml
      - depends_on_ogb
      - depends_on_sentence_transformers
      - py_version
      - test_python_common
      - depends_on_pylibwholegraph
      - depends_on_cugraph_pyg
  test_pylibwholegraph:
    output: none
    includes:
      - cuda_version
      - depends_on_cudf
      - depends_on_pytorch
      - py_version
      - test_python_common
      - depends_on_pylibwholegraph
      - test_python_pylibwholegraph
  py_build_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: build-system
    includes:
      - rapids_build_skbuild
  py_rapids_build_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - depends_on_libraft
      - depends_on_librmm
  py_run_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: project
    includes:
      - depends_on_libraft
      - depends_on_nccl
  py_build_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: build-system
    includes:
      - rapids_build_skbuild
  py_rapids_build_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - python_build_cythonize
      - depends_on_libwholegraph
      - depends_on_libraft
      - depends_on_librmm
  py_run_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: project
    includes:
      - python_run_pylibwholegraph
      - depends_on_libwholegraph
  py_test_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - test_python_common
      - test_python_pylibwholegraph
  py_build_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: build-system
    includes:
      - rapids_build_setuptools
  py_run_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: project
    includes:
      - depends_on_cupy
      - depends_on_pylibwholegraph
      - depends_on_pylibcugraph
      - python_run_cugraph_pyg
  py_test_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - depends_on_cuml
      - depends_on_cugraph
      - test_python_common
  cugraph_pyg_dev:
    matrix:
      cuda: ["12.9", "13.2"]
      arch: [x86_64, aarch64]
    output: conda
    conda_dir: python/cugraph-pyg/conda
    includes:
      - checks
      - depends_on_pylibcugraph
      - depends_on_pyg
      - depends_on_pytorch
      - test_python_common
  deps_that_require_torch:
    output: none
    includes:
      - depends_on_pyg
      - depends_on_sentence_transformers
  torch_only:
    output: none
    includes:
      - depends_on_pytorch
channels:
  - rapidsai-nightly
  - rapidsai
  - conda-forge
dependencies:
  checks:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
  # 'cuda_version' intentionally does not contain fallback entries... we want
  # a loud error if an unsupported 'cuda' value is passed
  cuda_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              cuda: "12.2"
            packages:
              - cuda-version=12.2
          - matrix:
              cuda: "12.5"
            packages:
              - cuda-version=12.5
          - matrix:
              cuda: "12.8"
            packages:
              - cuda-version=12.8
          - matrix:
              cuda: "12.9"
            packages:
              - cuda-version=12.9
          - matrix:
              cuda: "13.0"
            packages:
              - cuda-version=13.0
          - matrix:
              cuda: "13.1"
            packages:
              - cuda-version=13.1
          - matrix:
              cuda: "13.2"
            packages:
              - cuda-version=13.2
      - output_types: requirements
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              # some components (like nvidia-cublas-cu12 and nvidia-cuda-nvcc-cu12) didn't have
              # aarch64 wheels until CTK 12.3, so allow a slightly looser bound here
              - cuda-toolkit>=12.2,<12.4
          - matrix:
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.2.*
          - matrix:
              cuda: "12.5"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.5.*
          - matrix:
              cuda: "12.8"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.8.*
          - matrix:
              cuda: "12.9"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.9.*
          - matrix:
              cuda: "13.0"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.0.*
          - matrix:
              cuda: "13.1"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.1.*
          - matrix:
              cuda: "13.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.2.*
  cuda:
    common:
      - output_types: [conda]
        packages:
          - cuda-nvml-dev
          - cuda-nvtx-dev
          - cuda-profiler-api
          - libcublas-dev
          - libcurand-dev
          - libcusolver-dev
          - libcusparse-dev
  common_build:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - &cmake_ver cmake>=3.30.4
          - ninja
      - output_types: [conda]
        packages:
          - cuda-nvcc
    specific:
      - output_types: [conda]
        matrices:
          - matrix:
              arch: x86_64
            packages:
              - gcc_linux-64=14.*
          - matrix:
              arch: aarch64
            packages:
              - gcc_linux-aarch64=14.*
  docs:
    common:
      - output_types: [conda]
        packages:
          - breathe
          - doxygen
          - graphviz
  py_version:
    specific:
      - output_types: [conda]
        matrices:
          - matrix:
              py: "3.11"
            packages:
              - python=3.11
          - matrix:
              py: "3.12"
            packages:
              - python=3.12
          - matrix:
              py: "3.13"
            packages:
              - python=3.13
          - matrix:
              py: "3.14"
            packages:
              - python=3.14
          - matrix:
            packages:
              - python>=3.11
  python_build_cythonize:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - cython>=3.2.2
  python_run_pylibwholegraph:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - &numpy numpy>=1.23,<3.0
  python_run_cugraph_pyg:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - *numpy
          - pandas
  rapids_build_skbuild:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - &rapids_build_backend rapids-build-backend>=0.4.0,<0.5.0
      - output_types: conda
        packages:
          - scikit-build-core>=0.11.0
      - output_types: [requirements, pyproject]
        packages:
          - scikit-build-core[pyproject]>=0.11.0
  rapids_build_setuptools:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - *rapids_build_backend
          - setuptools>=77.0.0
          - wheel
  test_cpp:
    common:
      - output_types: conda
        packages:
          - *cmake_ver
  test_python_common:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - pytest
          - pytest-benchmark
          - pytest-cov
          - pytest-xdist
    specific:
      - output_types: [conda]
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
            packages:
              - torchdata
              - pydantic
  test_python_pylibwholegraph:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - pytest-forked
          - scipy
  depends_on_pytorch:
    specific:
      # conda: choose between GPU and CPU-only pytorch
      - output_types: conda
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
              require_gpu: "true"
            packages:
              - pytorch-gpu>=2.3
          # Default to falling back to whatever 'pytorch' is pulled in via cugraph-pyg's dependencies.
          - matrix:
            packages:
      # conda: optionally pin to older versions based on 'dependencies' key
      - output_types: conda
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
              cuda: "12.*"
              dependencies: "oldest"
            packages:
              - pytorch==2.4.1
          - matrix:
              cuda: "13.*"
              dependencies: "oldest"
            packages:
              - pytorch==2.9
          # Default to falling back to whatever 'pytorch' is pulled in via cugraph-pyg's dependencies.
          - matrix:
            packages:
      # wheels: handle GPU vs. CPU and version pinning together
      #
      # The 'pytorch.org' indices referenced in --extra-index-url below host CPU-only variants too,
      # so requirements like '>=' are not safe.
      #
      # Using '==' and a version with the CUDA specifier like '+cu130' is the most reliable way to ensure
      # the packages we want are pulled (at the expense of needing to maintain this list).
      #
      # 'torch' tightly pins wheels to a single {major}.{minor} CTK version.
      #
      # This list only contains entries exactly matching CUDA {major}.{minor} that we test in RAPIDS CI,
      # to ensure a loud error alerts us to the need to update this list (or CI scripts) when new
      # CTKs are added to the support matrix.
      - output_types: requirements
        matrices:
          # avoid pulling in 'torch' in places like DLFW builds that prefer to install it other ways
          - matrix:
              no_pytorch: "true"
            packages:
          # matrices below ensure CUDA 'torch' packages are used
          - matrix:
              arch: aarch64
              cuda: "12.9"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - &torch_cu129_index --extra-index-url=https://download.pytorch.org/whl/cu129
              # 'triton' didn't have aarch64 wheels until v3.5.0 and 'torch==2.8.0' pins to 'triton==3.4.0'...
              # so need to depend on a slightly newer 'torch' for the oldest-deps configuration on aarch64
              - torch==2.9.0+cu129
          - matrix:
              cuda: "12.9"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - *torch_cu129_index
              - torch==2.8.0+cu129
          - matrix:
              cuda: "12.9"
              require_gpu: "true"
            packages:
              - *torch_cu129_index
              - torch==2.10.0+cu129
          - matrix:
              cuda: "13.0"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - &torch_index_cu13 --extra-index-url=https://download.pytorch.org/whl/cu130
              - torch==2.8.0+cu130
          - matrix:
              cuda: "13.0"
              require_gpu: "true"
            packages:
              - *torch_index_cu13
              - torch==2.10.0+cu130
          - matrix:
            packages:
  depends_on_nccl:
    common:
      - output_types: conda
        packages:
          - nccl>=2.19
    specific:
      - output_types: [pyproject, requirements]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - nvidia-nccl-cu12>=2.19
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - nvidia-nccl-cu13>=2.19
          - matrix:
            packages:
  depends_on_ogb:
    common:
      - output_types: [conda]
        packages:
          - ogb
  # for MovieLens example
  depends_on_sentence_transformers:
    specific:
      - output_types: [conda, requirements, pyproject]
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
            packages:
              - sentence-transformers>=3.0.1
  depends_on_pyg:
    common:
      - output_types: [conda]
        packages:
          - pytorch_geometric>=2.5,<2.8
    specific:
      # no 'pyproject'... we intentionally keep 'torch-geometric' out of wheel
      # metadata so it's possible to install 'cugraph-pyg' without 'torch'
      - output_types: requirements
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
            packages:
              - torch-geometric>=2.5,<2.8
  depends_on_pylibwholegraph:
    common:
      - output_types: conda
        packages:
          - &pylibwholegraph_unsuffixed pylibwholegraph==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibwholegraph-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibwholegraph-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*pylibwholegraph_unsuffixed]}
  depends_on_libraft:
    common:
      - output_types: conda
        packages:
          - &libraft_unsuffixed libraft==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*libraft_unsuffixed]}
  depends_on_librmm:
    common:
      - output_types: conda
        packages:
          - &librmm_unsuffixed librmm==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*librmm_unsuffixed]}
  depends_on_libwholegraph:
    common:
      - output_types: conda
        packages:
          - &libwholegraph_unsuffixed libwholegraph==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libwholegraph-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libwholegraph-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*libwholegraph_unsuffixed]}
  depends_on_libwholegraph_tests:
    common:
      - output_types: conda
        packages:
          - libwholegraph-tests==26.6.*,>=0.0.0a0
  depends_on_rmm:
    common:
      - output_types: conda
        packages:
          - &rmm_unsuffixed rmm==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - rmm-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - rmm-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*rmm_unsuffixed]}
  depends_on_pylibcugraph:
    common:
      - output_types: conda
        packages:
          - &pylibcugraph_unsuffixed pylibcugraph==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*pylibcugraph_unsuffixed]}
  depends_on_cugraph:
    common:
      - output_types: conda
        packages:
          - &cugraph_unsuffixed cugraph==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cugraph-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cugraph-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*cugraph_unsuffixed]}
  depends_on_cuml:
    common:
      - output_types: conda
        packages:
          - &cuml_unsuffixed cuml==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cuml-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cuml-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*cuml_unsuffixed]}
  depends_on_cudf:
    common:
      - output_types: conda
        packages:
          - &cudf_unsuffixed cudf==26.6.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu12==26.6.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu13==26.6.*,>=0.0.0a0
          - {matrix: null, packages: [*cudf_unsuffixed]}
  depends_on_cupy:
    common:
      - output_types: conda
        packages:
          - cupy>=13.6.0
    # NOTE: This is intentionally not broken into groups by a 'cuda_suffixed' selector like
    #       other packages with -cu{nn}x suffixes in this file.
    #       All RAPIDS wheel builds (including in devcontainers) expect cupy to be suffixed.
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
