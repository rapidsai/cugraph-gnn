[tool.ruff]
line-length = 88
exclude = [
    "__init__.py",
]

[tool.ruff.lint]
ignore = [
    # whitespace before :
    "E203",
]

[tool.ruff.lint.isort]
known-first-party = ["cugraph_pyg", "pylibwholegraph"]
